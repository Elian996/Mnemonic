services:
  postgres:
    image: postgres:16-alpine
    container_name: mnemonic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mnemonic
      POSTGRES_PASSWORD: mnemonic
      POSTGRES_DB: mnemonic
    ports:
      - "5432:5432"
    volumes:
      - mnemonic_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnemonic -d mnemonic"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mnemonic_pg_data:
